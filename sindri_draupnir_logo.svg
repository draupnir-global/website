<svg viewBox="0 0 200 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Mjolnir — clean geometric hammer -->

  <!-- Hammer head block -->
  <path d="M 45 45 L 155 45 L 155 100 L 115 100 L 115 105 L 85 105 L 85 100 L 45 100 Z"
        fill="none" stroke="#C5A55A" stroke-width="2.5" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Inner hammer head detail — horizontal band -->
  <line x1="55" y1="65" x2="145" y2="65" stroke="#C5A55A" stroke-width="0.8" opacity="0.4"/>
  <line x1="55" y1="80" x2="145" y2="80" stroke="#C5A55A" stroke-width="0.8" opacity="0.4"/>

  <!-- Knotwork center mark on hammer face -->
  <circle cx="100" cy="72" r="8" fill="none" stroke="#C5A55A" stroke-width="1" opacity="0.5"/>
  <circle cx="100" cy="72" r="3" fill="#C5A55A" opacity="0.4"/>

  <!-- Handle -->
  <rect x="91" y="105" width="18" height="95" rx="3"
        fill="none" stroke="#C5A55A" stroke-width="2" filter="url(#glow)"/>

  <!-- Handle leather wrapping -->
  <line x1="93" y1="135" x2="107" y2="130" stroke="#C5A55A" stroke-width="0.8" opacity="0.45"/>
  <line x1="93" y1="145" x2="107" y2="140" stroke="#C5A55A" stroke-width="0.8" opacity="0.45"/>
  <line x1="93" y1="155" x2="107" y2="150" stroke="#C5A55A" stroke-width="0.8" opacity="0.45"/>
  <line x1="93" y1="165" x2="107" y2="160" stroke="#C5A55A" stroke-width="0.8" opacity="0.45"/>
  <line x1="93" y1="175" x2="107" y2="170" stroke="#C5A55A" stroke-width="0.8" opacity="0.45"/>

  <!-- Draupnir ring at pommel -->
  <circle cx="100" cy="212" r="12" fill="none" stroke="#C5A55A" stroke-width="1.8" filter="url(#glow)"/>
  <circle cx="100" cy="212" r="5" fill="#C5A55A" opacity="0.5" filter="url(#glow)"/>

  <!-- Connector handle to ring -->
  <line x1="100" y1="200" x2="100" y2="200" stroke="#C5A55A" stroke-width="2"/>
</svg>
