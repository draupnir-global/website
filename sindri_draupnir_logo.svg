<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <!-- Gold gradients for 3D effect -->
    <linearGradient id="goldMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5E6A3"/>
      <stop offset="25%" style="stop-color:#D4AF37"/>
      <stop offset="50%" style="stop-color:#C4A54D"/>
      <stop offset="75%" style="stop-color:#B8932B"/>
      <stop offset="100%" style="stop-color:#8B6914"/>
    </linearGradient>
    <linearGradient id="goldHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8DC"/>
      <stop offset="30%" style="stop-color:#F5E6A3"/>
      <stop offset="70%" style="stop-color:#C4A54D"/>
      <stop offset="100%" style="stop-color:#8B6914"/>
    </linearGradient>
    <linearGradient id="goldDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C4A54D"/>
      <stop offset="50%" style="stop-color:#8B6914"/>
      <stop offset="100%" style="stop-color:#6B4F0A"/>
    </linearGradient>
    <linearGradient id="hammerShaft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B6914"/>
      <stop offset="30%" style="stop-color:#D4AF37"/>
      <stop offset="50%" style="stop-color:#F5E6A3"/>
      <stop offset="70%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#8B6914"/>
    </linearGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFF8DC;stop-opacity:0.9"/>
      <stop offset="50%" style="stop-color:#D4AF37;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#C4A54D;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" fill="#0A0A0A"/>

  <!-- Mjolnir (Thor's Hammer) centered -->
  <g transform="translate(250, 230)" filter="url(#shadow)">
    <!-- Hammer head - blocky Norse style -->
    <rect x="-70" y="-45" width="140" height="55" rx="4" fill="url(#goldMain)" stroke="url(#goldDark)" stroke-width="2"/>
    <!-- Hammer head top bevel -->
    <rect x="-68" y="-43" width="136" height="8" rx="2" fill="url(#goldHighlight)" opacity="0.6"/>
    <!-- Hammer head side details -->
    <rect x="-74" y="-40" width="8" height="45" rx="3" fill="url(#goldHighlight)"/>
    <rect x="66" y="-40" width="8" height="45" rx="3" fill="url(#goldHighlight)"/>
    <!-- Hammer face left -->
    <rect x="-65" y="-35" width="55" height="35" rx="2" fill="url(#goldDark)" opacity="0.3"/>
    <!-- Hammer face right -->
    <rect x="10" y="-35" width="55" height="35" rx="2" fill="url(#goldDark)" opacity="0.3"/>
    <!-- Norse knotwork on hammer faces -->
    <path d="M-45,-25 Q-35,-15 -25,-25 Q-15,-35 -5,-25" fill="none" stroke="url(#goldHighlight)" stroke-width="1.5" opacity="0.5"/>
    <path d="M25,-25 Q35,-15 45,-25 Q55,-35 60,-25" fill="none" stroke="url(#goldHighlight)" stroke-width="1.5" opacity="0.5"/>

    <!-- Shaft -->
    <rect x="-8" y="10" width="16" height="90" rx="3" fill="url(#hammerShaft)" stroke="url(#goldDark)" stroke-width="1"/>
    <!-- Shaft wrap detail -->
    <line x1="-7" y1="30" x2="7" y2="25" stroke="url(#goldDark)" stroke-width="1.5" opacity="0.5"/>
    <line x1="-7" y1="40" x2="7" y2="35" stroke="url(#goldDark)" stroke-width="1.5" opacity="0.5"/>
    <line x1="-7" y1="50" x2="7" y2="45" stroke="url(#goldDark)" stroke-width="1.5" opacity="0.5"/>
    <line x1="-7" y1="60" x2="7" y2="55" stroke="url(#goldDark)" stroke-width="1.5" opacity="0.5"/>

    <!-- Pommel -->
    <ellipse cx="0" cy="102" rx="12" ry="6" fill="url(#goldMain)" stroke="url(#goldDark)" stroke-width="1"/>
  </g>

  <!-- Infinity/8 symbol wrapping around hammer -->
  <g transform="translate(250, 200)" filter="url(#glow)">
    <path d="M-90,0 C-90,-50 -40,-50 0,-20 C40,-50 90,-50 90,0 C90,50 40,50 0,20 C-40,50 -90,50 -90,0 Z"
          fill="none" stroke="url(#goldMain)" stroke-width="4" opacity="0.8"/>
    <!-- Inner infinity line for depth -->
    <path d="M-85,0 C-85,-45 -38,-45 0,-17 C38,-45 85,-45 85,0 C85,45 38,45 0,17 C-38,45 -85,45 -85,0 Z"
          fill="none" stroke="url(#goldHighlight)" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Eye of Odin at the center/crossing of infinity -->
  <g transform="translate(250, 200)">
    <!-- Eye outer shape (almond) -->
    <path d="M-22,0 Q0,-18 22,0 Q0,18 -22,0 Z" fill="url(#goldMain)" stroke="url(#goldDark)" stroke-width="1.5"/>
    <!-- Iris -->
    <circle cx="0" cy="0" r="8" fill="url(#goldDark)"/>
    <!-- Pupil -->
    <circle cx="0" cy="0" r="4" fill="#0A0A0A"/>
    <!-- Eye highlight -->
    <circle cx="-2" cy="-2" r="2" fill="#FFF8DC" opacity="0.7"/>
    <!-- Glow around eye -->
    <circle cx="0" cy="0" r="30" fill="url(#eyeGlow)" opacity="0.3"/>
  </g>

  <!-- Company name -->
  <text x="250" y="380" text-anchor="middle" fill="url(#goldMain)" font-family="Georgia, serif" font-size="28" font-weight="bold" letter-spacing="6">SINDRI DRAUPNIR</text>
  <text x="250" y="405" text-anchor="middle" fill="#666666" font-family="Helvetica, Arial, sans-serif" font-size="11" letter-spacing="4">OPERATIONS</text>

  <!-- Thin gold line -->
  <line x1="170" y1="415" x2="330" y2="415" stroke="url(#goldMain)" stroke-width="0.5" opacity="0.5"/>
  <text x="250" y="432" text-anchor="middle" fill="#444444" font-family="Helvetica, Arial, sans-serif" font-size="9" letter-spacing="2">ZUG, SWITZERLAND</text>
</svg>