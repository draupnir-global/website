<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="goldMain2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5E6A3"/>
      <stop offset="25%" style="stop-color:#D4AF37"/>
      <stop offset="50%" style="stop-color:#C4A54D"/>
      <stop offset="75%" style="stop-color:#B8932B"/>
      <stop offset="100%" style="stop-color:#8B6914"/>
    </linearGradient>
    <linearGradient id="goldHL2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8DC"/>
      <stop offset="30%" style="stop-color:#F5E6A3"/>
      <stop offset="70%" style="stop-color:#C4A54D"/>
      <stop offset="100%" style="stop-color:#8B6914"/>
    </linearGradient>
    <linearGradient id="goldDk2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C4A54D"/>
      <stop offset="50%" style="stop-color:#8B6914"/>
      <stop offset="100%" style="stop-color:#6B4F0A"/>
    </linearGradient>
    <linearGradient id="networkGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#8B6914;stop-opacity:0.3"/>
    </linearGradient>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#F5E6A3"/>
      <stop offset="100%" style="stop-color:#D4AF37"/>
    </radialGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" fill="#0A0A0A"/>

  <!-- Blockchain network - connecting lines (behind anvil) -->
  <g opacity="0.5" filter="url(#glow2)">
    <!-- Network connections -->
    <line x1="100" y1="120" x2="180" y2="170" stroke="url(#networkGold)" stroke-width="1"/>
    <line x1="180" y1="170" x2="250" y2="140" stroke="url(#networkGold)" stroke-width="1"/>
    <line x1="250" y1="140" x2="340" y2="160" stroke="url(#networkGold)" stroke-width="1"/>
    <line x1="340" y1="160" x2="400" y2="120" stroke="url(#networkGold)" stroke-width="1"/>
    <line x1="180" y1="170" x2="160" y2="240" stroke="url(#networkGold)" stroke-width="1"/>
    <line x1="340" y1="160" x2="360" y2="230" stroke="url(#networkGold)" stroke-width="1"/>
    <line x1="100" y1="120" x2="80" y2="200" stroke="url(#networkGold)" stroke-width="1"/>
    <line x1="400" y1="120" x2="420" y2="190" stroke="url(#networkGold)" stroke-width="1"/>
    <!-- Lower network -->
    <line x1="80" y1="290" x2="160" y2="310" stroke="url(#networkGold)" stroke-width="1"/>
    <line x1="160" y1="310" x2="200" y2="280" stroke="url(#networkGold)" stroke-width="1"/>
    <line x1="340" y1="300" x2="420" y2="280" stroke="url(#networkGold)" stroke-width="1"/>
    <line x1="300" y1="290" x2="340" y2="300" stroke="url(#networkGold)" stroke-width="1"/>
    <!-- Cross connections -->
    <line x1="160" y1="240" x2="200" y2="280" stroke="url(#networkGold)" stroke-width="0.8" opacity="0.5"/>
    <line x1="360" y1="230" x2="340" y2="300" stroke="url(#networkGold)" stroke-width="0.8" opacity="0.5"/>
    <line x1="80" y1="200" x2="80" y2="290" stroke="url(#networkGold)" stroke-width="0.8" opacity="0.5"/>
    <line x1="420" y1="190" x2="420" y2="280" stroke="url(#networkGold)" stroke-width="0.8" opacity="0.5"/>

    <!-- Network nodes (small blockchain blocks) -->
    <rect x="95" y="115" width="10" height="10" rx="1" fill="url(#nodeGlow)" opacity="0.8"/>
    <rect x="175" y="165" width="10" height="10" rx="1" fill="url(#nodeGlow)" opacity="0.8"/>
    <rect x="245" y="135" width="10" height="10" rx="1" fill="url(#nodeGlow)" opacity="0.8"/>
    <rect x="335" y="155" width="10" height="10" rx="1" fill="url(#nodeGlow)" opacity="0.8"/>
    <rect x="395" y="115" width="10" height="10" rx="1" fill="url(#nodeGlow)" opacity="0.8"/>
    <rect x="75" y="195" width="10" height="10" rx="1" fill="url(#nodeGlow)" opacity="0.6"/>
    <rect x="155" y="235" width="10" height="10" rx="1" fill="url(#nodeGlow)" opacity="0.6"/>
    <rect x="355" y="225" width="10" height="10" rx="1" fill="url(#nodeGlow)" opacity="0.6"/>
    <rect x="415" y="185" width="10" height="10" rx="1" fill="url(#nodeGlow)" opacity="0.6"/>
    <rect x="75" y="285" width="10" height="10" rx="1" fill="url(#nodeGlow)" opacity="0.5"/>
    <rect x="155" y="305" width="10" height="10" rx="1" fill="url(#nodeGlow)" opacity="0.5"/>
    <rect x="195" y="275" width="10" height="10" rx="1" fill="url(#nodeGlow)" opacity="0.5"/>
    <rect x="295" y="285" width="10" height="10" rx="1" fill="url(#nodeGlow)" opacity="0.5"/>
    <rect x="335" y="295" width="10" height="10" rx="1" fill="url(#nodeGlow)" opacity="0.5"/>
    <rect x="415" y="275" width="10" height="10" rx="1" fill="url(#nodeGlow)" opacity="0.5"/>
  </g>

  <!-- Anvil centered -->
  <g transform="translate(250, 230)" filter="url(#shadow2)">
    <!-- Anvil horn (left pointy part) -->
    <path d="M-75,-15 Q-90,-20 -95,-10 Q-90,0 -75,5 Z" fill="url(#goldMain2)" stroke="url(#goldDk2)" stroke-width="1.5"/>

    <!-- Anvil face (top flat surface) -->
    <path d="M-75,-20 L75,-20 L80,-10 L-80,-10 Z" fill="url(#goldHL2)" stroke="url(#goldDk2)" stroke-width="1.5"/>

    <!-- Anvil body (front face) -->
    <path d="M-80,-10 L80,-10 L65,25 Q60,30 55,30 L-55,30 Q-60,30 -65,25 Z" fill="url(#goldMain2)" stroke="url(#goldDk2)" stroke-width="1.5"/>

    <!-- Anvil waist -->
    <path d="M-55,30 L55,30 L50,45 L-50,45 Z" fill="url(#goldDk2)" stroke="url(#goldDk2)" stroke-width="1"/>

    <!-- Anvil base (wider) -->
    <path d="M-50,45 L50,45 L65,55 Q70,60 70,65 L-70,65 Q-70,60 -65,55 Z" fill="url(#goldMain2)" stroke="url(#goldDk2)" stroke-width="1.5"/>

    <!-- Base bottom -->
    <rect x="-70" y="65" width="140" height="8" rx="2" fill="url(#goldDk2)"/>

    <!-- Highlight on face -->
    <path d="M-70,-18 L70,-18 L75,-12 L-75,-12 Z" fill="url(#goldHL2)" opacity="0.4"/>

    <!-- Step/heel (right side) -->
    <rect x="55" y="-20" width="25" height="15" rx="2" fill="url(#goldMain2)" stroke="url(#goldDk2)" stroke-width="1"/>
    <rect x="56" y="-19" width="23" height="4" rx="1" fill="url(#goldHL2)" opacity="0.4"/>
  </g>

  <!-- Central blockchain block on anvil (being forged) -->
  <g transform="translate(250, 195)" filter="url(#glow2)">
    <!-- Glowing block being forged -->
    <rect x="-12" y="-12" width="24" height="24" rx="3" fill="none" stroke="url(#goldHL2)" stroke-width="2"/>
    <rect x="-8" y="-8" width="16" height="16" rx="1" fill="url(#nodeGlow)" opacity="0.8"/>
    <!-- Sparks -->
    <circle cx="-20" cy="-8" r="1.5" fill="#FFF8DC" opacity="0.7"/>
    <circle cx="22" cy="-5" r="1" fill="#FFF8DC" opacity="0.6"/>
    <circle cx="-15" cy="-15" r="1" fill="#F5E6A3" opacity="0.5"/>
    <circle cx="18" cy="-12" r="1.5" fill="#F5E6A3" opacity="0.6"/>
    <circle cx="0" cy="-18" r="1" fill="#FFF8DC" opacity="0.4"/>
  </g>

  <!-- Company name -->
  <text x="250" y="370" text-anchor="middle" fill="url(#goldMain2)" font-family="Georgia, serif" font-size="28" font-weight="bold" letter-spacing="6">SINDRI DIGITAL</text>
  <text x="250" y="395" text-anchor="middle" fill="#666666" font-family="Helvetica, Arial, sans-serif" font-size="11" letter-spacing="4">BLOCKCHAIN &amp; DIGITAL ASSETS</text>

  <!-- Thin gold line -->
  <line x1="170" y1="405" x2="330" y2="405" stroke="url(#goldMain2)" stroke-width="0.5" opacity="0.5"/>
  <text x="250" y="422" text-anchor="middle" fill="#444444" font-family="Helvetica, Arial, sans-serif" font-size="9" letter-spacing="2">ZUG, SWITZERLAND</text>
</svg>